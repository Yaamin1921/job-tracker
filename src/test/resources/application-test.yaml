spring:
  datasource:
    url: jdbc:h2:mem:jobtracker;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  task:
    scheduling:
      enabled: false

  sql:
    init:
      mode: always
      data-locations: classpath:database-init-scripts/schema.sql
  h2:
    console:
      enabled: true
