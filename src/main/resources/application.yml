springdoc:
  swagger-ui:
    use-root-path: true
  api-docs:
    enabled: true
  server:
    forward-headers-strategy: framework

spring:
  application:
    name: job-tracker

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: job_tracker

  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

logging:
  level:
    com.jobtracker: INFO