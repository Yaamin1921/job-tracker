server:
  port: 8080

spring:
  application:
    name: job-tracker
  datasource:
    url: jdbc:postgresql://localhost:5432/job_tracker
    username: postgres
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
      #date converted to standard string format

logging:
  level:
    org.hibernate.SQL: DEBUG